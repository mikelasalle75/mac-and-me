<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'VT323',monospace;color:#00ff41}

.crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.18) 2px,rgba(0,0,0,0.18) 4px);pointer-events:none;z-index:20}
.crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,transparent 55%,rgba(0,0,0,0.5) 100%);pointer-events:none;z-index:21}
.screen{padding:18px 22px;position:relative;z-index:1}
.dos-bar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #003800;padding-bottom:8px;margin-bottom:10px;font-size:1rem;color:#00cc33;letter-spacing:.05rem}
#output{height:420px;overflow-y:auto;font-size:1.25rem;line-height:1.65;padding-right:6px;scroll-behavior:smooth}
#output::-webkit-scrollbar{width:5px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:#003800}
.ln{display:block;word-break:break-word}
.ln-echo{color:#006600}
.ln-info{color:#88ff88}
.ln-warn{color:#ffff55}
.ln-err{color:#ff5555}
.ln-dim{color:#336633}
.ln-sep{color:#003800}
.ln-head{color:#00ff41;font-size:1.5rem;text-align:center;letter-spacing:.3rem}
.input-row{display:flex;align-items:center;border-top:1px solid #003800;padding-top:10px;margin-top:10px;gap:8px;font-size:1.25rem}
.prompt-sym{color:#00ff41;flex-shrink:0}
#cmd{flex:1;background:transparent;border:none;outline:none;color:#00ff41;font-family:'VT323',monospace;font-size:1.25rem;caret-color:#00ff41}
.statusbar{display:flex;justify-content:space-between;margin-top:8px;font-size:.95rem;color:#336633;padding:0 2px}
@keyframes flicker{0%,94%,96%,100%{opacity:1}95%{opacity:.88}97%{opacity:.95}}
.crt{animation:flicker 9s infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</head>
<body>
<div class="monitor-shell">
  <div class="monitor-label">TANDY 1000 · 640K RAM · MS-DOS 3.3</div>
  <div class="crt">
    <div class="screen">

      </div>
      <div id="output"></div>
      <div class="input-row">
        <span class="prompt-sym">&gt;</span>

      </div>
      <div class="statusbar">

        <span id="s-energy">ENERGY: ██████████ 100%</span>
        <span id="s-score">SCORE: 0</span>
        <span id="s-moves">MOVES: 0</span>
      </div>
    </div>

  <div class="monitor-label" style="margin-top:10px">● POWER &nbsp;&nbsp; ◉ BRIGHTNESS</div>

// ================================================================

//  Based on the 1988 film that definitely exists and is definitely
//  a real movie and not a 93-minute McDonald's commercial.
// ================================================================

const out = document.getElementById('output');
const cmdEl = document.getElementById('cmd');

function pr(text, cls=''){
  const s = document.createElement('span');
  s.className = 'ln' + (cls ? ' ln-'+cls : '');
  s.textContent = text;
  out.appendChild(s);
  out.appendChild(document.createElement('br'));
  out.scrollTop = out.scrollHeight;
}
function blank(){ out.appendChild(document.createElement('br')); }
function sep(){ pr('────────────────────────────────────────────────────','sep'); }
function echo(t){ pr('> ' + t, 'echo'); }

// ── GAME STATE ────────────────────────────────────────────────
const G = {
  room:'crash_site', inv:[], flags:{},
  energy:100, score:0, moves:0,
  over:false, won:false
};

function addScore(n){ G.score+=n; updateHUD(); }

function energize(n, msg){
  G.energy = Math.min(100, G.energy+n);
  if(msg) pr(msg,'info');
  updateHUD();
}

function drain(n=5){
  G.energy = Math.max(0, G.energy-n);
  if(G.energy<=0){
    gameOver('Your energy hits zero. You collapse in a heap on the floor.\nA nearby human nudges you with their foot. "Is this normal?"\nIt is not normal. Drink Coca-Cola next time.');
  } else if(G.energy<=15){
    pr('[CRITICAL: ENERGY DANGEROUSLY LOW — drink Coca-Cola NOW]','err');
  } else if(G.energy<=35){
    pr('[WARNING: Energy low — find Coca-Cola soon]','warn');
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('s-loc').textContent = 'LOC: '+(rooms[G.room]?.short||'?');
  const b = Math.round(G.energy/10);
  document.getElementById('s-energy').textContent =
    'ENERGY: '+'█'.repeat(b)+'░'.repeat(10-b)+' '+G.energy+'%';
  document.getElementById('s-score').textContent = 'SCORE: '+G.score;
  document.getElementById('s-moves').textContent = 'MOVES: '+G.moves;
}

function mkCoke(id){
  return {
    id, name:'Coca-Cola Can', short:'coke can',

    portable:true,
    onGet(){ pr('You grab the Coca-Cola. Your entire being thrills with anticipation.'); },
    onUse(){ energize(35,'You crack the can. Fizz. Life. Everything is going to be okay. (+35 energy)'); removeFromInv(id); }
  };
}

// ── ROOM DESCRIPTIONS ─────────────────────────────────────────
function descRoom(){
  const r = rooms[G.room];
  if(!r){ pr('ERROR: Invalid room.','err'); return; }
  blank();
  pr('[ ' + r.name.toUpperCase() + ' ]','info');
  blank();
  r.desc.forEach(l=>pr(l));

  // items in room (not in inv)
  const vis = (r.items||[]).filter(id=>!G.inv.includes(id) && items[id]);
  if(vis.length>0){
    blank();
    pr('You see: '+vis.map(id=>items[id].name).join(', ')+'.','dim');
  }

  // npcs
  const here = (r.npcs||[]).filter(id=>!G.flags['gone_'+id]);
  if(here.length>0){
    blank();
    pr('Also here: '+here.map(id=>npcs[id]?.name||id).join(', ')+'.','dim');
  }

  // exits
  const ex = Object.keys(r.exits||{});
  if(ex.length>0){
    blank();
    pr('Exits: '+ex.map(e=>e.toUpperCase()).join(', ')+'.','dim');
  }
  updateHUD();
}

// ── ITEM FINDERS ──────────────────────────────────────────────
function matchItem(target, list){
  return list.find(id=>{
    const it=items[id];
    if(!it) return false;
    return it.keys?.some(k=>target.includes(k)) ||
           target.includes(it.short||'') ||
           (it.name||'').toLowerCase().includes(target);
  });
}
function inRoom(target){
  const r=rooms[G.room];
  const vis=(r.items||[]).filter(id=>!G.inv.includes(id)&&items[id]);
  return matchItem(target,vis);
}
function inInv(target){ return matchItem(target, G.inv); }

// ── PARSER ────────────────────────────────────────────────────
const history=[];
let histIdx=-1;

cmdEl.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    const v=cmdEl.value.trim();
    cmdEl.value='';
    if(!v) return;
    history.unshift(v); histIdx=-1;
    parse(v);
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    histIdx=Math.min(histIdx+1, history.length-1);
    if(history[histIdx]) cmdEl.value=history[histIdx];
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    histIdx=Math.max(histIdx-1,-1);
    cmdEl.value=histIdx>=0?history[histIdx]:'';
  }
});

function parse(raw){
  if(G.over){ pr('Game over. Type NEW to restart.','warn'); return; }
  echo(raw);
  G.moves++;
  if(G.moves%8===0) drain(5);
  updateHUD();

  const words = raw.toLowerCase().replace(/[^a-z0-9\s]/g,'').trim().split(/\s+/);
  const v = words[0];
  const rest = words.slice(1).join(' ');

  const DIR_MAP={
    n:'north',s:'south',e:'east',w:'west',u:'up',d:'down',
    ne:'northeast',nw:'northwest',se:'southeast',sw:'southwest',
    north:'north',south:'south',east:'east',west:'west',up:'up',down:'down',
    northeast:'northeast',northwest:'northwest',southeast:'southeast',southwest:'southwest',
    underground:'underground',inside:'north',outside:'south',in:'north',out:'south'
  };

  if(DIR_MAP[v]) return go(DIR_MAP[v]);

  switch(v){
    case 'go': case 'walk': case 'run': case 'move': case 'travel': case 'head':
      return go(rest);
    case 'climb':
      if(rest.includes('up')||rest===''||rest.includes('out')) return go('up');
      if(rest.includes('down')||rest.includes('rope')) return go('down');
      return go('up');
    case 'enter': return go(rest.includes('ship')?'north':rest||'north');

    case 'look': case 'l':
      if(!rest||rest==='around'||rest==='room') return descRoom();
      return examine(rest);
    case 'examine': case 'x': case 'ex': case 'inspect': case 'check': case 'read':
      return examine(rest);

    case 'get': case 'take': case 'grab': case 'pick':
      return getItem(rest.replace(/^up\s*/,''));
    case 'drop': case 'discard': return dropItem(rest);
    case 'use': case 'drink': case 'eat': case 'activate': case 'open':
      return useItem(rest);

    case 'inventory': case 'i': case 'inv': case 'items': case 'bag': case 'carry':
      return showInv();

    case 'talk': case 'speak': case 'ask': case 'greet': case 'chat': case 'say': case 'tell':
      return talkTo(rest.replace(/^to\s*/,''));

    case 'dance':
      return tryDance();
    case 'hide':
      return tryHide();
    case 'launch': case 'fly': case 'blast': case 'liftoff': case 'takeoff':
      return launchShip();
    case 'override': case 'code': case 'unlock': case 'release':
      return openCells();
    case 'wait': case 'z':
      pr('Time passes. Your nose glows thoughtfully.','dim');
      drain(2);
      return;
    case 'score': case 'status':
      pr('Score: '+G.score+' | Moves: '+G.moves+' | Energy: '+G.energy+'%'); return;
    case 'help': case '?': case 'commands':
      return showHelp();
    case 'new': case 'restart': case 'reset': case 'again':
      return initGame();
    default:
      pr('I don\'t understand "'+v+'". Type HELP for commands.','err');
  }
}

function go(dir){
  dir=dir.trim().toLowerCase();
  const r=rooms[G.room];
  const dest=r?.exits?.[dir];
  if(!dest){ pr("You can't go "+dir.toUpperCase()+" from here.",'err'); return; }

  // Gate: facility guard
  if(dest==='facility_lobby' && !G.flags.badge_shown){
    pr('The guard steps in your path.','err');
    pr('GUARD: "BADGE. Show me a badge. You look extremely unbadged."');
    pr('(Find a government badge and USE it here first.)');
    return;
  }

  G.room=dest;
  blank();
  descRoom();
}

function getItem(target){
  if(!target){ pr('Get what?','err'); return; }
  const id=inRoom(target);
  if(!id){ pr('"'+target+'" isn\'t here.','err'); return; }
  const it=items[id];
  if(!it.portable){ pr("You can't take that.",'err'); return; }
  if(G.inv.includes(id)){ pr("You already have that.",'dim'); return; }
  G.inv.push(id);
  rooms[G.room].items=(rooms[G.room].items||[]).filter(x=>x!==id);
  if(it.onGet) it.onGet();
  else pr('Taken.','info');
  updateHUD();
}

function dropItem(target){
  if(!target){ pr('Drop what?','err'); return; }
  const id=inInv(target);
  if(!id){ pr("You're not carrying that.",'err'); return; }
  G.inv=G.inv.filter(x=>x!==id);
  rooms[G.room].items=rooms[G.room].items||[];
  rooms[G.room].items.push(id);
  pr('Dropped.','dim');
}

function useItem(target){
  if(!target){ pr('Use what?','err'); return; }
  let id=inInv(target);
  if(!id) id=inRoom(target);
  if(!id){ pr("You don't have or see that.",'err'); return; }
  const it=items[id];
  if(it?.onUse) it.onUse();
  else pr("You can't use that right now.",'dim');
}

function examine(target){
  if(!target){ descRoom(); return; }
  let id=inInv(target)||inRoom(target);
  if(id){ blank(); pr(items[id].desc); return; }
  // check npcs
  const r=rooms[G.room];
  for(const nid of (r.npcs||[])){
    const n=npcs[nid];
    if(n?.keys?.some(k=>target.includes(k))){
      pr('You examine '+n.name+'.','dim'); return;
    }
  }
  // room features
  if(['sign','poster','wall','door','window','furniture'].some(k=>target.includes(k))){
    pr('Just part of the scenery. Probably irrelevant. Probably.','dim'); return;
  }
  pr("You don't see anything special.",'dim');
}

function talkTo(target){
  if(!target){ pr('Talk to whom?','err'); return; }
  const r=rooms[G.room];
  for(const nid of (r.npcs||[])){
    const n=npcs[nid];
    if(!n) continue;
    if(n.keys?.some(k=>target.includes(k))||target.includes((n.name||'').toLowerCase())){
      blank();
      if(n.onTalk){ n.onTalk(); return; }
      pr(n.name+': '+n.lines[n.idx%n.lines.length],'info');
      n.idx++;
      return;
    }
  }
  pr('There\'s nobody called "'+target+'" here.','err');
}

function showInv(){
  if(G.inv.length===0){
    pr("You're carrying nothing. Just your alien dignity, which weighs nothing.",'dim'); return;
  }
  blank();
  pr('INVENTORY:','info');
  const seen={};
  G.inv.forEach(id=>{
    const n=items[id]?.name||id;
    seen[n]=(seen[n]||0)+1;
  });
  Object.entries(seen).forEach(([n,c])=>{
    pr('  - '+n+(c>1?' (x'+c+')':''));
  });
}

// ── WIN / LOSE ─────────────────────────────────────────────────
function win(){
  G.over=true; G.won=true; addScore(100);
  blank(); sep();
  pr('★  ★  ★   Y O U   W I N   ★  ★  ★','head');
  sep(); blank();
  pr('The spacecraft hums to life. The ignition chip finds its slot.');
  pr('Your family buckles in with the dignity of beings who have DEFINITELY done this before.');
  blank();
  pr('The ship rises — through the basement ceiling (it just goes through it),');
  pr('through the facility roof, through the floodlights, and into the night sky.');
  blank();
  pr('Below, you see: the McDonald\'s, the park, Maple Street,');
  pr('Eric waving furiously from his wheelchair,');
  pr('Dr. Wickett dancing alone in the parking lot,');
  pr('Agent Henderson chasing the van that has somehow started itself,');
  pr('and Janet Webber, who has noticed nothing unusual, watering her rubber plant.');
  blank();
  pr('"We should not return," says your father.');
  pr('"Agreed," says your mother.');
  pr('"Can we do the McDonald\'s drive-through on the way out?" asks your sibling.');
  pr('There is a long silence.','dim');
  pr('"...One drive-through," your mother says.','info');
  blank(); sep();
  pr('FINAL SCORE: '+G.score+' points in '+G.moves+' moves.','info');
  pr('THANK YOU FOR PLAYING.','dim');
  pr('IN LOVING MEMORY OF REAL ALIENS, WHEREVER YOU ARE.','dim');
  sep(); blank();
  pr('Type NEW to play again.','dim');
  updateHUD();
}

function gameOver(msg){
  G.over=true;
  blank(); sep();
  pr('☠   G A M E   O V E R   ☠','err');
  sep(); blank();
  msg.split('\n').forEach(l=>pr(l,'err'));
  blank();
  pr('Score: '+G.score+' in '+G.moves+' moves.','dim');
  pr('Type NEW to try again.','dim');
  sep();
}

// ── HELP ──────────────────────────────────────────────────────
function showHelp(){
  blank();
  pr('══ COMMANDS ══════════════════════════════════════','info');
  pr('MOVEMENT : N S E W U D NE NW SE SW UNDERGROUND');
  pr('LOOK     : L or LOOK — describe current location');
  pr('EXAMINE  : X <thing> — look closely at something');
  pr('GET      : GET <item> — pick up an item');
  pr('DROP     : DROP <item>');
  pr('USE      : USE <item> — use, drink, eat, activate');
  pr('TALK     : TALK TO <person> — speak to someone');
  pr('INVENTORY: I — list carried items');
  pr('DANCE    : DANCE — know when to use this');
  pr('HIDE     : HIDE — near plants');
  pr('OPEN     : OPEN CELLS / OVERRIDE — cell release');
  pr('LAUNCH   : LAUNCH — when in the ship');
  pr('SCORE    : SCORE — current score and stats');
  pr('NEW      : NEW — restart game');
  blank();
  pr('TIPS:','warn');
  pr('  ★ Drink Coca-Cola to maintain energy (critical mechanic)');
  pr('  ★ Talk to everyone — NPCs share vital info');
  pr('  ★ Use the COMMUNICATOR early');
  pr('  ★ The McDonald\'s hat is more useful than it looks');
  pr('  ★ Read everything you pick up');
}

// ── INTRO + INIT ──────────────────────────────────────────────
function initGame(){
  // Reset
  Object.assign(G,{room:'crash_site',inv:[],flags:{},energy:100,score:0,moves:0,over:false,won:false});
  // Restore item lists to rooms (in case of restart)
  rooms.crash_site.items=['coke1'];
  rooms.crash_debris.items=['communicator','alien_doc'];
  rooms.desert_road.items=['vacuum_hose'];
  rooms.drain_ditch.items=['coke2'];
  rooms.park.items=['alien_grass'];
  rooms.picnic_area.items=['coke3','mcdonalds_bag'];
  rooms.webber_living.items=['rubber_plant'];
  rooms.webber_kitchen.items=['coke4','coke5'];
  rooms.webber_garage.items=['vacuum_cleaner','coke6'];
  rooms.mcdonalds_lot.items=['mcdonalds_hat'];
  rooms.mcdonalds_kitchen.items=['coke7'];
  rooms.party_room.items=['mystery_present'];
  rooms.gov_van.items=['gov_badge','facility_map'];
  rooms.facility_lab.items=['lab_notes'];
  rooms.basement.items=['ship_key'];
  // Reset NPC indexes
  Object.values(npcs).forEach(n=>{ if(n.idx!==undefined) n.idx=0; });

  out.innerHTML='';
  sep();
  pr('','head');
  pr('  M A C   A N D   M E','head');
  pr('  A Text Adventure','head');
  pr('');
  pr('  Based on the 1988 film nobody asked for,','dim');
  pr('  everybody forgot, and one alien endured.','dim');
  sep();
  blank();
  pr('You are MAC. Mysterious Alien Creature.');
  pr('You look like a small being in a rubber suit, because that is what you look like.');
  pr('Your nose glows. Your eyes are large. You love Coca-Cola with your entire alien soul.');
  blank();
  pr('Your family\'s spacecraft has just crashed in the Mojave Desert.');
  pr('Your family is GONE — almost certainly captured by government agents');
  pr('who mean well but are profoundly inconvenient.');
  blank();
  pr('MISSION: Find your family. Stay alive. Get home.','info');
  pr('WARNING: You run on Coca-Cola. Do not run out.','warn');
  blank();
  pr('Type HELP for commands. Type LOOK to see your surroundings.','dim');
  sep();
  blank();
  descRoom();
  updateHUD();
}

initGame();
